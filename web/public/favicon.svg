  <line x1="77" y1="53" x2="96" y2="44" stroke="#0D0D0D" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="72" y1="68" x2="86" y2="88" stroke="#0D0D0D" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="56" y1="68" x2="42" y2="88" stroke="#0D0D0D" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="51" y1="53" x2="32" y2="44" stroke="#0D0D0D" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Subtle ball border -->
  <circle cx="64" cy="64" r="42" fill="none" stroke="#222" stroke-width="1.5"/>
