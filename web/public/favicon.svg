<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="28" fill="#0A0A0A"/>
  <!-- Green orbit arc -->
  <circle cx="64" cy="64" r="56" fill="none" stroke="#4ADE80" stroke-width="5" stroke-dasharray="45 310" stroke-linecap="round"/>
  <!-- White ball -->
  <circle cx="64" cy="64" r="42" fill="#F8F9FA"/>
