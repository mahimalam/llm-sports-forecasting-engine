<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="chGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="chShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="chBloom" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="chGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="60" cy="60" r="56" fill="#0f0f1a"/>
  <circle cx="60" cy="60" r="56" fill="url(#chGlow)"/>
  <circle cx="60" cy="60" r="52" fill="none" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="6 4 2 4" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="12s" repeatCount="indefinite"/>
  </circle>
  <!-- Trophy body -->
  <path d="M42 30h36v10c0 14-6 24-14 28v8h8v4H48v-4h8v-8c-8-4-14-14-14-28V30z" fill="url(#chGrad)" filter="url(#chBloom)"/>
  <!-- Handles -->
  <path d="M42 34h-4a4 4 0 00-4 4v4c0 6 4 10 8 12" fill="none" stroke="url(#chGrad)" stroke-width="4" stroke-linecap="round"/>
  <path d="M78 34h4a4 4 0 014 4v4c0 6-4 10-8 12" fill="none" stroke="url(#chGrad)" stroke-width="4" stroke-linecap="round"/>
  <!-- Base -->
  <rect x="44" y="82" width="32" height="5" rx="2.5" fill="#b8860b"/>
  <rect x="40" y="87" width="40" height="4" rx="2" fill="#8b6914"/>
  <!-- Shine overlay -->
  <path d="M48 30h8v10c0 10-2 16-4 20v-30z" fill="url(#chShine)"/>
  <!-- Star -->
  <path d="M60 42l3 6 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1 3-6z" fill="#fff" opacity="0.3"/>
  <!-- Sparkles -->
  <circle cx="35" cy="28" r="1.5" fill="#ffd700" filter="url(#chBloom)">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="85" cy="26" r="1" fill="#ffd700" filter="url(#chBloom)">
    <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="28" cy="45" r="1" fill="#ffa502" filter="url(#chBloom)">
    <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite" begin="1s"/>
  </circle>
</svg>
