<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="ddGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="ddBloom" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="ddGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="60" cy="60" r="56" fill="#0f0f1a"/>
  <circle cx="60" cy="60" r="56" fill="url(#ddGlow)"/>
  <circle cx="60" cy="60" r="50" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="5 8" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="20s" repeatCount="indefinite"/>
  </circle>
  <!-- Calendar body -->
  <rect x="32" y="34" width="56" height="54" rx="6" fill="#1a1a2e" stroke="url(#ddGrad)" stroke-width="2"/>
  <!-- Calendar header -->
  <rect x="32" y="34" width="56" height="16" rx="6" fill="url(#ddGrad)" opacity="0.8"/>
  <rect x="32" y="44" width="56" height="6" fill="url(#ddGrad)" opacity="0.8"/>
  <!-- Calendar pins -->
  <rect x="44" y="28" width="4" height="12" rx="2" fill="#00d4ff"/>
  <rect x="72" y="28" width="4" height="12" rx="2" fill="#00d4ff"/>
  <!-- Grid dots -->
  <circle cx="44" cy="60" r="2" fill="#3b82f6" opacity="0.4"/>
  <circle cx="54" cy="60" r="2" fill="#3b82f6" opacity="0.4"/>
  <circle cx="64" cy="60" r="2" fill="#3b82f6" opacity="0.4"/>
  <circle cx="74" cy="60" r="2" fill="#3b82f6" opacity="0.4"/>
  <circle cx="44" cy="72" r="2" fill="#3b82f6" opacity="0.4"/>
  <circle cx="54" cy="72" r="2" fill="#3b82f6" opacity="0.4"/>
  <!-- Checkmark -->
  <path d="M52 72l6 6 14-14" fill="none" stroke="#00e87b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#ddBloom)"/>
</svg>
