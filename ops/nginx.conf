server {
    listen 80;
    server_name vexp.me www.vexp.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vexp.me www.vexp.me;

    # Cloudflare Origin cert (or Let's Encrypt)
    ssl_certificate     /etc/ssl/certs/vexp.me.pem;
    ssl_certificate_key /etc/ssl/private/vexp.me.key;

    root /opt/eap-sports/web/dist;
    index index.html;

    # ─── API: SSE live stream (long-lived) ─────────────
    location /api/live/stream {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # ─── API reverse proxy ───────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ─── TMA (Vite build) ────────────────────────────────
    location /tma/ {
        alias /opt/eap-sports/tma/dist/;
        try_files $uri $uri/ /tma/index.html;
    }

    # ─── Static site (Astro) ─────────────────────────────
    location / {
        try_files $uri $uri/ =404;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # ─── Static assets long cache ────────────────────────
    location ~* \.(js|css|png|jpg|webp|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;
}
