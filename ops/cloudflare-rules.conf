# EAP-Sports: Cloudflare Configuration
# Apply via Cloudflare Dashboard -> Rules -> Page Rules / Cache Rules

# ─── DNS ──────────────────────────────────────────────────
# A record: vexp.me -> VPS_IP (Proxied)
# CNAME: www -> vexp.me (Proxied)

# ─── SSL/TLS ─────────────────────────────────────────────
# Mode: Full (Strict)
# Origin Certificate: Generate in Cloudflare -> install at /etc/ssl/certs/vexp.me.pem

# ─── Cache Rules ──────────────────────────────────────────

# Rule 1: API — bypass cache
# Match: URI path starts with /api/
# Action: Bypass Cache

# Rule 2: Static assets — aggressive cache
# Match: URI path matches /tma/* OR file extensions (js,css,png,jpg,webp,svg,woff2)
# Action: Cache Everything, Edge TTL 30 days, Browser TTL 30 days

# Rule 3: HTML pages — short edge cache (ISR-friendly)
# Match: URI path does NOT start with /api/ AND does NOT match static extensions
# Action: Cache Everything, Edge TTL 1 hour, Browser TTL 5 min

# ─── Page Rules (legacy, if Cache Rules not available) ────
# vexp.me/api/*           -> Cache Level: Bypass
# vexp.me/tma/*           -> Cache Level: Cache Everything, Edge TTL 1 month
# vexp.me/*               -> Cache Level: Cache Everything, Edge TTL 1 hour

# ─── Security ────────────────────────────────────────────
# WAF: On (Managed ruleset)
# Bot Fight Mode: On
# Browser Integrity Check: On
# Hotlink Protection: On

# ─── Performance ──────────────────────────────────────────
# Auto Minify: JS, CSS, HTML
# Brotli: On
# Early Hints: On
# HTTP/2: On
# HTTP/3: On
